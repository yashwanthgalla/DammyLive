<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  
  <!-- Primary Viewport Configuration — Optimized for all devices -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover, user-scalable=yes" />
  
  <!-- SEO & Description -->
  <meta name="description"
    content="DammyLive — A curated Formula 1 editorial platform with real-time race data, live timing, standings, and circuit profiles for the 2026 season." />
  <meta name="keywords" content="Formula 1, F1, Live Timing, Race Data, DammyLive, Editorial" />
  <meta name="author" content="DammyLive Editorial" />
  
  <!-- Theme Configuration -->
  <meta name="theme-color" content="#1A1A1A" />
  <meta name="color-scheme" content="light" />
  
  <!-- Apple Mobile Web App Configuration -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="DammyLive" />
  <link rel="apple-touch-icon" href="/logo.png" />
  
  <!-- Android Web App Configuration -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="application-name" content="DammyLive" />
  
  <!-- Additional Mobile Optimizations -->
  <meta name="format-detection" content="telephone=no" />
  <meta name="format-detection" content="email=no" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  
  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json" />
  
  <!-- Title -->
  <title>DammyLive — F1</title>
  
  <!-- Luxury Editorial Font Pairing -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  
  <!-- Preload critical assets -->
  <link rel="preload" as="image" href="/logo.png" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
